<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lesson Enquiry</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f3f5f8;
            padding: 40px 20px;
        }

        .enquiry-form {

            width: 100%;
            max-width: 500px;
            margin: auto;

            background: #fff;

            padding: 35px;

            border-radius: 12px;

            box-shadow: 0 12px 35px rgba(0, 0, 0, .08);

        }

        .enquiry-form h2 {

            text-align: center;
            color: #c40000;
            margin-bottom: 30px;
            font-size: 30px;

        }

        .field {

            margin-bottom: 18px;

        }

        .field label {

            display: block;

            margin-bottom: 8px;

            color: #555;

            font-size: 14px;

            font-weight: 600;

            line-height: 1.4;

        }

        input,
        select,
        textarea {

            width: 100%;

            padding: 15px 16px;

            border: 1px solid #d7dce3;

            border-radius: 8px;

            background: #fff;

            font-size: 15px;

            transition: .3s;

            outline: none;

        }

        input:focus,
        select:focus,
        textarea:focus {

            border-color: #c40000;

            box-shadow: 0 0 0 3px rgba(196, 0, 0, .12);

        }

        textarea {

            resize: vertical;

            min-height: 130px;

        }

        button {

            width: 100%;

            height: 55px;

            border: none;

            background: #c40000;

            color: #fff;

            border-radius: 8px;

            display: flex;

            align-items: center;

            justify-content: center;

            gap: 10px;

            cursor: pointer;

            font-size: 15px;

            font-weight: 700;

            text-transform: uppercase;

            letter-spacing: .5px;

            transition: .3s;

        }

        button:hover {

            background: #a60000;

            transform: translateY(-2px);

            box-shadow: 0 12px 20px rgba(196, 0, 0, .25);

        }

        button .btn-icon {

            width: 18px;

            height: 18px;

            fill: #fff;

            transition: .3s;

        }

        button:hover .btn-icon {

            transform: translateX(4px);

        }

        #response {

            margin-top: 18px;

            text-align: center;

            font-weight: bold;

        }

        @media(max-width:600px) {

            .enquiry-form {

                padding: 22px;

            }

            .enquiry-form h2 {

                font-size: 25px;

            }

        }
    </style>

</head>

<body>

    <form id="enquiryForm" class="enquiry-form">


        <div class="field">
            <input type="text" name="name" placeholder="Name" required>
        </div>

        <div class="field">
            <input type="text" name="phone" placeholder="Tel" required>
        </div>

        <div class="field">
            <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="field">
            <input type="text" name="postcode" placeholder="Postcode" required>
        </div>

        <div class="field">
            <label>Have you had any previous lessons?</label>

            <select name="driving_experience" required>

                <option value="">Select</option>

                <option>Beginner</option>

                <option>Some Experience</option>

                <option>Experienced</option>

            </select>

        </div>

        <div class="field">

            <label>
                Do you want auto or manual? Please note, Manual lessons available in Atherton, Bolton & Oldham ONLY
            </label>

            <select name="type_of_training" required>

                <option value="">Select</option>

                <option>Car Driving Lessons</option>

                <option>Automatic Car Lessons</option>

                <option>Manual Car Lessons</option>

                <option>Refresher Lessons</option>

                <option>Intensive Course</option>

            </select>

        </div>

        <div class="field">

            <label>Do you have a provisional licence?</label>

            <select name="licence" required>

                <option value="">Select</option>

                <option>Yes</option>

                <option>No</option>

            </select>

        </div>

        <div class="field">

            <label>Tell us your preferred start date</label>

            <input type="date" name="preferred_start_date" required>

        </div>

        <div class="field">

            <label>Tell us your preferred lesson time</label>

            <select name="lesson_preference_time" required>

                <option value="">Select</option>

                <option>Morning</option>

                <option>Afternoon</option>

                <option>Evening</option>

            </select>

        </div>

        <div class="field">

            <label>Tell us your preferred contact method</label>

            <select name="preferred_contact_method" required>

                <option value="">Select</option>

                <option>Phone Call</option>

                <option>WhatsApp</option>

                <option>Email</option>

            </select>

        </div>

        <div class="field">

            <label>How did you find us?</label>

            <select name="source" required>

                <option value="">Select</option>

                <option>Google</option>

                <option>Facebook</option>

                <option>Instagram</option>

                <option>Referral</option>

                <option>Website</option>

                <option>Other</option>

            </select>

        </div>

        <div class="field">

            <textarea name="additional_message" placeholder="Message"></textarea>

        </div>

        <button type="submit">

            <svg aria-hidden="true" viewBox="0 0 512 512" class="btn-icon">
                <path
                    d="M440 6.5L24 246.4c-34.4 19.9-31.1 70.8 5.7 85.9L144 379.6V464c0 46.4 59.2 65.5 86.6 28.6l43.8-59.1 111.9 46.2c5.9 2.4 12.1 3.6 18.3 3.6 8.2 0 16.3-2.1 23.6-6.2 12.8-7.2 21.6-20 23.9-34.5l59.4-387.2c6.1-40.1-36.9-68.8-71.5-48.9zM192 464v-64.6l36.6 15.1L192 464zm212.6-28.7l-153.8-63.5L391 169.5c10.7-15.5-9.5-33.5-23.7-21.2L155.8 332.6 48 288 464 48l-59.4 387.3z" />
            </svg>

            <span>Lesson Enquiry</span>

        </button>

        <div id="response"></div>

    </form>

    <script>

        const form = document.getElementById("enquiryForm");

        form.addEventListener("submit", async (e) => {

            e.preventDefault();

            const btn = form.querySelector("button");

            btn.disabled = true;

            btn.querySelector("span").innerText = "Submitting...";

            const data = {

                name: form.name.value,
                email: form.email.value,
                phone: form.phone.value,
                postcode: form.postcode.value,
                driving_experience: form.driving_experience.value,
                type_of_training: form.type_of_training.value,
                licence: form.licence.value,
                lesson_preference_time: form.lesson_preference_time.value,
                preferred_start_date: form.preferred_start_date.value,
                preferred_contact_method: form.preferred_contact_method.value,
                source: form.source.value,
                additional_message: form.additional_message.value

            };

            try {

                const response = await fetch("https://api.drive4pass.co.uk/api/en/enquiries", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(data)

                });

                const result = await response.json();

                if (response.ok) {

                    document.getElementById("response").style.color = "green";

                    document.getElementById("response").innerHTML = "✓ Enquiry submitted successfully.";

                    form.reset();

                } else {

                    document.getElementById("response").style.color = "red";

                    document.getElementById("response").innerHTML = result.message || "Submission failed.";

                }

            } catch (error) {

                document.getElementById("response").style.color = "red";

                document.getElementById("response").innerHTML = "Unable to connect to the server.";

                console.log(error);

            }

            btn.disabled = false;

            btn.querySelector("span").innerText = "Lesson Enquiry";

        });

    </script>

</body>

</html>
